<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0119;
  --s1:#170122;
  --s2:#200130;
  --acc:#c440ff;
  --acc2:#7b1fa2;
  --pink:#e040fb;
  --text:#f5eeff;
  --muted:#9d7bbf;
  --border:rgba(196,64,255,0.22);
  --border2:rgba(196,64,255,0.42);
}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Nunito',sans-serif;
  font-size:15px;
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 85% 5%,  rgba(92,107,192,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 15% 85%, rgba(196,64,255,0.14) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(196,64,255,0.05) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}

.card{
  position:relative;
  z-index:1;
  background:rgba(23,1,34,0.85);
  border:1px solid var(--border2);
  border-radius:24px;
  padding:48px 44px;
  max-width:560px;
  width:90%;
  text-align:center;
  box-shadow:0 0 60px rgba(196,64,255,0.12), 0 0 0 1px rgba(196,64,255,0.08);
}

.checkmark{
  width:72px;height:72px;
  border-radius:50%;
  background:rgba(196,64,255,0.15);
  border:2px solid rgba(196,64,255,0.5);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 28px;
  font-size:32px;
}

.title{
  font-family:'Press Start 2P',monospace;
  font-size:15px;
  color:var(--acc);
  margin-bottom:12px;
  line-height:1.6;
  text-shadow:0 0 20px rgba(196,64,255,0.5);
}

.subtitle{
  font-size:13px;
  color:var(--muted);
  margin-bottom:32px;
  font-family:'Press Start 2P',monospace;
  line-height:1.8;
}

.instruction{
  background:rgba(196,64,255,0.07);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px 22px;
  font-size:14px;
  line-height:1.8;
  color:var(--text);
  margin-bottom:32px;
  text-align:left;
}

.instruction p{margin-bottom:8px;}
.instruction p:last-child{margin-bottom:0;}

.discord-link{
  color:var(--acc);
  text-decoration:none;
  font-weight:800;
  border-bottom:1px solid rgba(196,64,255,0.35);
  transition:color 0.2s, border-color 0.2s;
}
.discord-link:hover{
  color:#fff;
  border-color:rgba(255,255,255,0.5);
}

.steps{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:32px;
  text-align:left;
}

.step{
  display:flex;
  align-items:flex-start;
  gap:12px;
  font-size:14px;
  line-height:1.6;
  color:var(--text);
}

.step-num{
  min-width:24px;height:24px;
  border-radius:50%;
  background:rgba(196,64,255,0.2);
  border:1px solid rgba(196,64,255,0.4);
  font-size:11px;
  font-weight:800;
  color:var(--acc);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  margin-top:2px;
}

.btn-home{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 28px;
  border-radius:12px;
  border:1px solid var(--border2);
  background:transparent;
  color:var(--muted);
  font-family:'Nunito',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  transition:all 0.2s;
}
.btn-home:hover{
  background:rgba(196,64,255,0.1);
  color:var(--text);
  border-color:var(--acc);
}

.logo-bar{
  position:relative;
  z-index:1;
  margin-bottom:32px;
  font-family:'Press Start 2P',monospace;
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.05em;
}
.logo-bar span{color:var(--acc);}
</style>
</head>
<body>

<div class="logo-bar"><span>SPLIN</span> SMP</div>

<div class="card">
  <div class="checkmark">✅</div>

  <div class="title">Оплата прошла!</div>
  <div class="subtitle">Спасибо за поддержку сервера</div>

  <div class="instruction">
    <p>Перейди в канал <a class="discord-link" href="https://discord.com/channels/1453795062096990272/1503556989089878088" target="_blank">💳・услуги</a> на нашем Discord-сервере и открой тикет.</p>
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div>Прикрепи <strong>скриншот оплаты</strong> из Robokassa или банка</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div>Напиши <strong>какую услугу</strong> ты приобрёл (Prime, Prime+, Проходка и т.д.)</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div>Укажи свой <strong>никнейм в Minecraft</strong></div>
    </div>
  </div>

  <a href="https://smp.splin.space/" class="btn-home">← Вернуться на сайт</a>
</div>

</body>
</html>
