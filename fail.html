<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0119;
  --s1:#170122;
  --acc:#c440ff;
  --text:#f5eeff;
  --muted:#9d7bbf;
  --border:rgba(196,64,255,0.22);
  --border2:rgba(196,64,255,0.42);
  --red:#ff4d6d;
  --red-bg:rgba(255,77,109,0.08);
  --red-border:rgba(255,77,109,0.28);
}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Nunito',sans-serif;
  font-size:15px;
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 80% 10%, rgba(255,77,109,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 15% 85%, rgba(196,64,255,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(196,64,255,0.04) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}

.card{
  position:relative;
  z-index:1;
  background:rgba(23,1,34,0.85);
  border:1px solid var(--border2);
  border-radius:24px;
  padding:48px 44px;
  max-width:540px;
  width:90%;
  text-align:center;
  box-shadow:0 0 60px rgba(196,64,255,0.10), 0 0 0 1px rgba(196,64,255,0.06);
}

.icon{
  width:72px;height:72px;
  border-radius:50%;
  background:var(--red-bg);
  border:2px solid var(--red-border);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 28px;
  font-size:32px;
}

.title{
  font-family:'Press Start 2P',monospace;
  font-size:13px;
  color:var(--red);
  margin-bottom:10px;
  line-height:1.7;
  text-shadow:0 0 20px rgba(255,77,109,0.4);
}

.subtitle{
  font-size:13px;
  color:var(--muted);
  margin-bottom:30px;
  font-family:'Press Start 2P',monospace;
  line-height:1.9;
}

.reasons{
  background:var(--red-bg);
  border:1px solid var(--red-border);
  border-radius:14px;
  padding:18px 20px;
  margin-bottom:28px;
  text-align:left;
}

.reasons-title{
  font-size:11px;
  font-weight:800;
  color:var(--red);
  margin-bottom:12px;
  text-transform:uppercase;
  letter-spacing:0.08em;
}

.reason{
  display:flex;
  align-items:flex-start;
  gap:10px;
  font-size:13px;
  line-height:1.6;
  color:var(--muted);
  margin-bottom:8px;
}
.reason:last-child{margin-bottom:0;}
.reason-dot{
  color:var(--red);
  font-size:16px;
  line-height:1.3;
  flex-shrink:0;
}

.discord-block{
  background:rgba(196,64,255,0.07);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px 20px;
  font-size:14px;
  line-height:1.8;
  color:var(--text);
  margin-bottom:28px;
}

.discord-link{
  color:var(--acc);
  text-decoration:none;
  font-weight:800;
  border-bottom:1px solid rgba(196,64,255,0.35);
  transition:color 0.2s, border-color 0.2s;
}
.discord-link:hover{
  color:#fff;
  border-color:rgba(255,255,255,0.5);
}

.btns{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 24px;
  border-radius:12px;
  font-family:'Nunito',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  transition:all 0.2s;
}

.btn-retry{
  background:rgba(196,64,255,0.15);
  border:1px solid var(--border2);
  color:var(--acc);
}
.btn-retry:hover{
  background:rgba(196,64,255,0.25);
  color:#fff;
}

.btn-home{
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
}
.btn-home:hover{
  background:rgba(196,64,255,0.07);
  color:var(--text);
  border-color:var(--border2);
}

.logo-bar{
  position:relative;
  z-index:1;
  margin-bottom:32px;
  font-family:'Press Start 2P',monospace;
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.05em;
}
.logo-bar span{color:var(--acc);}
</style>
</head>
<body>

<div class="logo-bar"><span>SPLIN</span> SMP</div>

<div class="card">
  <div class="icon">❌</div>

  <div class="title">Что-то пошло не так</div>
  <div class="subtitle">Оплата не прошла</div>

  <div class="reasons">
    <div class="reasons-title">Возможные причины</div>
    <div class="reason"><span class="reason-dot">·</span><span>Недостаточно средств на карте</span></div>
    <div class="reason"><span class="reason-dot">·</span><span>Платёж отклонён банком</span></div>
    <div class="reason"><span class="reason-dot">·</span><span>Истекло время ожидания</span></div>
    <div class="reason"><span class="reason-dot">·</span><span>Вы закрыли окно оплаты раньше времени</span></div>
  </div>

  <div class="discord-block">
    Попробуйте снова или свяжитесь с нами в канале&nbsp;<a class="discord-link" href="https://discord.com/channels/1453795062096990272/1503556989089878088" target="_blank">💳・услуги</a> — поможем разобраться.
  </div>

  <div class="btns">
    <a href="https://smp.splin.space/#donate" class="btn btn-retry">↩ Попробовать снова</a>
    <a href="https://smp.splin.space/" class="btn btn-home">← На главную</a>
  </div>
</div>

</body>
</html>
